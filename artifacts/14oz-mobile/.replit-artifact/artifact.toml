kind = "mobile"
previewPath = "/14oz-mobile/"
title = "14oz ERP Mobile"
version = "1.0.0"
id = "artifacts/14oz-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/14oz-mobile/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/14oz-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/14oz-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/14oz-mobile", "run", "serve" ]

[services.env]
PORT = "3000"
BASE_PATH = "/14oz-mobile/"
