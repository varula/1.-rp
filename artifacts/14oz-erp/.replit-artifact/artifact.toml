kind = "web"
previewPath = "/"
title = "14oz ERP"
version = "1.0.0"
id = "artifacts/14oz-erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20824

[services.development]
run = "pnpm --filter @workspace/14oz-erp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/14oz-erp", "run", "build" ]
publicDir = "artifacts/14oz-erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20824"
BASE_PATH = "/"
